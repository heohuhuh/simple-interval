<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>심플 인터벌</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

<meta name="theme-color" content="#111111">
</head>

<body>

<div class="container">

<h1>심플 인터벌</h1>

<div id="round">
라운드 0 / 0
</div>

<div id="mode">
대기중
</div>

<div id="timer">
00:00
</div>

<div class="settings">

<input id="work" type="number" value="30">
<label>운동(초)</label>

<input id="rest" type="number" value="10">
<label>휴식(초)</label>

<input id="rounds" type="number" value="5">
<label>라운드</label>

</div>

<div class="buttons">
<button id="startBtn">시작</button>
<button id="pauseBtn">일시정지</button>
<button id="resetBtn">초기화</button>
</div>

</div>

<script src="app.js"></script>

</body>
</html>
